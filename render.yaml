services:
  - type: web
    runtime: node
    name: watchdog-api
    plan: free
    buildCommand: npm ci && npm run build --workspace=shared && npm run build --workspace=scanner && npm run prisma:generate --workspace=backend && npm run build --workspace=backend
    preDeployCommand: npm run prisma:migrate:deploy --workspace=backend
    startCommand: npm run start --workspace=backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/watchdog.db
      - key: ENABLE_LOCAL_SCANS
        value: "false"
      - key: CORS_ORIGINS
        value: https://watchdog-chi.vercel.app
    disk:
      name: watchdog-data
      mountPath: /var/data
      sizeGB: 1
