services:
  - type: web
    runtime: node
    name: watchdog-api
    plan: free
    buildCommand: npm ci && npm run build --workspace=shared && npm run build --workspace=scanner && npm run prisma:generate --workspace=backend && npm run build --workspace=backend
    preDeployCommand: npm run prisma:migrate:deploy --workspace=backend
    startCommand: npm run start --workspace=backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/watchdog.db
      - key: ENABLE_LOCAL_SCANS
        value: "false"
      - key: CORS_ORIGINS
        value: https://watchdog-chi.vercel.app
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON_BASE64
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: AUTH_REQUIRED
        value: "true"
      - key: AUTH_ALLOWED_EMAILS
        sync: false
    disk:
      name: watchdog-data
      mountPath: /var/data
      sizeGB: 1
